  type: url-test
  include-all: true
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  timeout: 3000
  lazy: true
  max-failed-times: 5
  disable-udp: false
- name: MANUAL
  type: select
  include-all: true
rules:
- MATCH,AUTO
