name: FlClash Auto-Converter

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Filter and Internal Convert
        run: |
          python3 -c "
          import urllib.request, urllib.parse, base64, re

          SOURCE_URL = 'https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt'
          BAD_PATTERN = re.compile(r'(🇷🇺|ru\b|su\b|russia|moscow|vk|yandex|timeweb)', re.IGNORECASE)

          def parse_vless(link, index):
              try:
                  url = urllib.parse.urlparse(link.strip())
                  if url.scheme != 'vless': return None
                  query = dict(urllib.parse.parse_qsl(url.query))
                  
                  # Очистка имени и проверка фильтров
                  raw_name = urllib.parse.unquote(url.fragment) if url.fragment else url.hostname
                  if BAD_PATTERN.search(raw_name) or BAD_PATTERN.search(link): return None
                  
                  # Формируем уникальное имя без спецсимволов YAML
                  name = f'Node-{index}-' + re.sub(r'[^\w\s-]', '', raw_name)[:30]
                  
                  p = {
                      'name': name.strip(),
                      'server': url.hostname,
                      'port': int(url.port),
                      'uuid': url.username,
                      'sni': query.get('sni', ''),
                      'type': query.get('type', 'tcp'),
                      'security': query.get('security', 'none'),
                      'fp': query.get('fp', 'chrome'),
                      'pbk': query.get('pbk', ''),
                      'sid': query.get('sid', ''),
                      'path': query.get('path', '/'),
                      'host': query.get('host', ''),
                      'flow': query.get('flow', '')
                  }
                  return p
              except: return None

          try:
              req = urllib.request.Request(SOURCE_URL, headers={'User-Agent': 'Mozilla/5.0'})
              content = urllib.request.urlopen(req).read().decode('utf-8')
              if 'vless://' not in content:
                  content = base64.b64decode(content).decode('utf-8')
              
              proxies = []
              for i, l in enumerate(content.splitlines()):
                  res = parse_vless(l, i)
                  if res: proxies.append(res)

              with open('flclash.yaml', 'w', encoding='utf-8') as f:
                  f.write('proxies:\n')
                  for p in proxies:
                      f.write(f'  - name: \"{p[\"name\"]}\"\n')
                      f.write(f'    type: vless\n    server: {p[\"server\"]}\n    port: {p[\"port\"]}\n')
                      f.write(f'    uuid: {p[\"uuid\"]}\n    cipher: auto\n    udp: true\n')
                      f.write(f'    tls: {\"true\" if p[\"security\"] in [\"tls\", \"reality\"] else \"false\"}\n')
                      if p['sni']: f.write(f'    servername: {p[\"sni\"]}\n')
                      if p['flow']: f.write(f'    flow: {p[\"flow\"]}\n')
                      if p['security'] == 'reality':
                          f.write(f'    reality-opts:\n      public-key: {p[\"pbk\"]}\n      short-id: {p[\"sid\"]}\n')
                      if p['type'] == 'ws':
                          f.write(f'    ws-opts:\n      path: {p[\"path\"]}\n      headers:\n        Host: {p[\"host\"] or p[\"server\"]}\n')
                      elif p['type'] == 'grpc':
                          f.write(f'    grpc-opts:\n      grpc-service-name: {p[\"path\"]}\n')
                      f.write(f'    client-fingerprint: {p[\"fp\"]}\n')
                  
                  f.write('\nproxy-groups:\n')
                  f.write('  - name: Auto-Select\n    type: url-test\n    url: http://www.gstatic.com/generate_204\n    interval: 300\n    proxies:\n')
                  for p in proxies: f.write(f'      - \"{p[\"name\"]}\"\n')
                  f.write('\nrules:\n  - MATCH,Auto-Select\n')
                  
              print(f'Done! Found {len(proxies)} nodes.')
          except Exception as e:
              print(f'Error: {e}')
              exit(1)
          "

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add flclash.yaml
          git commit -m "Final independent convert [skip ci]" || exit 0
          git push
