name: Update non-RU config

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Generate config without RU
        run: |
          python - <<'EOF'
          import requests
          import yaml
          from urllib.parse import parse_qs, unquote
          import sys

          def parse_vless(line):
              line = line.strip()
              if not line.startswith('vless://') or '%F0%9F%87%B7%F0%9F%87%BA' in line:
                  return None
              if '#' in line:
                  config_part, remark_part = line.split('#', 1)
                  remark = unquote(remark_part).strip() or "NoName"
              else:
                  remark = "NoName"
              url_part = config_part[8:]
              if '@' not in url_part:
                  return None
              uuid, rest = url_part.split('@', 1)
              if '?' in rest:
                  host_port, query = rest.split('?', 1)
                  params = parse_qs(query)
              else:
                  host_port = rest
                  params = {}
              server, port_str = host_port.rsplit(':', 1) if ':' in host_port else (host_port, '443')
              try: port = int(port_str)
              except: port = 443
              proxy = {
                  "name": remark,
                  "type": "vless",
                  "server": server,
                  "port": port,
                  "uuid": uuid,
                  "udp": True,
                  "skip-cert-verify": False,
              }
              net = params.get("type", ["tcp"])[0]
              if net != "tcp":
                  proxy["network"] = net
              sec = params.get("security", ["none"])[0]
              if sec in ("tls", "reality"):
                  proxy["tls"] = True
                  proxy["servername"] = params.get("sni", params.get("host", [server]))[0]
                  if "fp" in params:
                      proxy["client-fingerprint"] = params["fp"][0]
              if sec == "reality" and "pbk" in params:
                  proxy["reality-opts"] = {
                      "public-key": params["pbk"][0],
                      "short-id": params.get("sid", [""])[0],
                  }
              if net == "ws" and "path" in params:
                  proxy["ws-opts"] = {"path": unquote(params["path"][0])}
                  if "host" in params:
                      proxy["ws-opts"].setdefault("headers", {})["Host"] = params["host"][0]
              return proxy

          url = "https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt"
          try:
              r = requests.get(url, timeout=12)
              r.raise_for_status()
          except Exception as e:
              print(f"Download failed: {e}", file=sys.stderr)
              sys.exit(1)

          proxies = [p for line in r.text.splitlines() if (p := parse_vless(line))]

          print(f"Non-RU servers: {len(proxies)}", file=sys.stderr)

          if not proxies:
              print("No proxies found", file=sys.stderr)
              sys.exit(0)

          config = {
              "mixed-port": 7890,
              "allow-lan": True,
              "mode": "rule",
              "log-level": "info",
              "proxies": proxies,
              "proxy-groups": [
                  {"name": "PROXY", "type": "select", "proxies": [p["name"] for p in proxies]}
              ],
              "rules": ["MATCH,PROXY"]
          }

          with open("non-ru-config.yaml", "w", encoding="utf-8") as f:
              yaml.dump(config, f, allow_unicode=True, sort_keys=False, indent=2, default_flow_style=False)

          print("non-ru-config.yaml written")
          EOF

      - name: Commit changes if any
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add non-ru-config.yaml
          git diff --staged --quiet || git commit -m "Auto: update non-RU config"
          git push
