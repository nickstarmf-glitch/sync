name: 30-Min Proxy Sync

on:
  schedule:
    - cron: '*/30 * * * *' # Запуск каждые 30 минут (в 00 и 30 минут часа)
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run filter script
        run: |
          python3 -c "
          import requests, random, re

          # Твоя ссылка-источник
          source_url = 'https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt'

          try:
              res = requests.get(source_url, timeout=15)
              if res.status_code == 200:
                  # Собираем все строки vless
                  all_proxies = [line.strip() for line in res.text.split('\n') if line.strip().startswith('vless://')]
                  
                  # Фильтр: убираем флаг РФ 🇷🇺, домены .ru/.su и слова russia/moscow/vk/yandex/timeweb
                  bad_pattern = re.compile(r'(🇷🇺|ru\b|su\b|russia|moscow|vk|yandex|timeweb)', re.IGNORECASE)
                  
                  valid_proxies = [p for p in all_proxies if not bad_pattern.search(p)]
                  
                  # Тщательно перемешиваем, чтобы список всегда был разным
                  random.shuffle(valid_proxies)
                  
                  # Сохраняем результат в файл proxies.txt
                  with open('proxies.txt', 'w', encoding='utf-8') as f:
                      f.write('\n'.join(valid_proxies))
                  print(f'Success! Found {len(valid_proxies)} clean proxies.')
          except Exception as e:
              print(f'Error: {e}')
          "

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add proxies.txt
          git commit -m "Update proxies [skip ci]" || exit 0
          git push

