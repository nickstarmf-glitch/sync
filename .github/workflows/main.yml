name: FlClash Auto-Converter

on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Filter and Internal Convert
        run: |
          python3 -c "
          import urllib.request, urllib.parse, base64, re, json

          SOURCE_URL = 'https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt'
          BAD_PATTERN = re.compile(r'(🇷🇺|ru\b|su\b|russia|moscow|vk|yandex|timeweb)', re.IGNORECASE)

          def parse_vless(link):
              try:
                  url = urllib.parse.urlparse(link)
                  if url.scheme != 'vless': return None
                  
                  query = dict(urllib.parse.parse_qsl(url.query))
                  name = urllib.parse.unquote(url.fragment) if url.fragment else url.hostname
                  
                  if BAD_PATTERN.search(name): return None

                  proxy = {
                      'name': name[:50], # Обрезаем слишком длинные имена
                      'type': 'vless',
                      'server': url.hostname,
                      'port': int(url.port),
                      'uuid': url.username,
                      'cipher': 'auto',
                      'tls': query.get('security') in ['tls', 'reality'],
                      'udp': True,
                      'servername': query.get('sni', ''),
                      'network': query.get('type', 'tcp')
                  }

                  if query.get('security') == 'reality':
                      proxy['reality-opts'] = {
                          'public-key': query.get('pbk', ''),
                          'short-id': query.get('sid', '')
                      }
                  
                  if proxy['network'] == 'ws':
                      proxy['ws-opts'] = {
                          'path': query.get('path', '/'),
                          'headers': {'Host': query.get('host', '')}
                      }
                  elif proxy['network'] == 'grpc':
                      proxy['grpc-opts'] = {'grpc-service-name': query.get('serviceName', '')}
                      
                  proxy['client-fingerprint'] = query.get('fp', 'chrome')
                  return proxy
              except: return None

          try:
              content = urllib.request.urlopen(SOURCE_URL).read().decode('utf-8')
              if 'vless://' not in content:
                  content = base64.b64decode(content).decode('utf-8')
              
              links = content.splitlines()
              proxies = []
              for l in links:
                  p = parse_vless(l.strip())
                  if p: proxies.append(p)

              # Генерируем YAML вручную, чтобы не ставить лишние библиотеки
              config = {
                  'proxies': proxies,
                  'proxy-groups': [
                      {'name': 'Auto-Select', 'type': 'url-test', 'proxies': [p['name'] for p in proxies], 'url': 'http://www.gstatic.com/generate_204', 'interval': 300},
                      {'name': 'Manual-Select', 'type': 'select', 'proxies': ['Auto-Select'] + [p['name'] for p in proxies]}
                  ],
                  'rules': ['MATCH,Auto-Select']
              }

              with open('flclash.yaml', 'w', encoding='utf-8') as f:
                  import yaml
                  # Если yaml нет, используем json-подобный формат, который Clash тоже ест
                  f.write('proxies:\n')
                  for p in proxies:
                      f.write(f'  - name: \"{p[\"name\"]}\"\n')
                      for k, v in p.items():
                          if k == 'name': continue
                          if isinstance(v, dict):
                              f.write(f'    {k}:\n')
                              for subk, subv in v.items(): f.write(f'      {subk}: {subv}\n')
                          else:
                              f.write(f'    {k}: {v}\n')
                  f.write('\nproxy-groups:\n')
                  for g in config['proxy-groups']:
                      f.write(f'  - name: {g[\"name\"]}\n    type: {g[\"type\"]}\n    proxies:\n')
                      for pn in g['proxies']: f.write(f'      - \"{pn}\"\n')
                      if 'url' in g: f.write(f'    url: {g[\"url\"]}\n    interval: {g[\"interval\"]}\n')
                  f.write('\nrules:\n  - MATCH,Auto-Select\n')
                  
              print(f'Done! {len(proxies)} proxies converted.')
          except Exception as e:
              print(f'Error: {e}')
              exit(1)
          "

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add flclash.yaml
          git commit -m "Internal convert [skip ci]" || exit 0
          git push
